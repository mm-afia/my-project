<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Pet Pals - PetPal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc',
              400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1',
              800: '#075985', 900: '#0c4a6e',
            },
          },
        },
      },
    }
  </script>
</head>
<body class="min-h-screen bg-gray-50">
  <nav class="bg-white shadow-md sticky top-0 z-50" id="navbar"></nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-4">Find Pet Pals Near You</h1>
      <p class="text-gray-600">Your location: 37.7749, -122.4194</p>
    </div>

    <div class="flex flex-col md:flex-row gap-6">
      <!-- Filters Sidebar -->
      <div class="md:w-64 bg-white rounded-lg shadow-md p-6 h-fit">
        <h3 class="font-semibold text-gray-900 mb-4">Filters</h3>
        
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Max Distance: <span id="distanceValue">10</span> miles
            </label>
            <input type="range" id="distanceFilter" min="0" max="10" value="10" class="w-full" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Max Price: $<span id="priceValue">100</span>/hr
            </label>
            <input type="range" id="priceFilter" min="0" max="100" value="100" class="w-full" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Min Rating: <span id="ratingValue">Any</span>
            </label>
            <input type="range" id="ratingFilter" min="0" max="5" step="0.1" value="0" class="w-full" />
          </div>
        </div>
      </div>

      <!-- Results -->
      <div class="flex-1">
        <div class="flex items-center justify-between mb-6">
          <p class="text-gray-600"><span id="resultsCount">0</span> pet pals found</p>
          <select id="sortSelect" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
            <option value="distance">Sort by Distance</option>
            <option value="price">Sort by Price</option>
            <option value="rating">Sort by Rating</option>
          </select>
        </div>

        <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/petpals-list.js"></script>
</body>
</html>
